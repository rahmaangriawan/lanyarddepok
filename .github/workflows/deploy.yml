name: Deploy Lanyard Depok

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: lanyarddepok.com
  REMOTE_PATH: htdocs/lanyarddepok.com
  APP_PORT: "3007"
  PUBLIC_SITE_URL: https://lanyarddepok.com
  PUBLIC_BACKEND_URL: https://lanyarddepok.com
  PUBLIC_API_BASE_URL: https://lanyarddepok.com/api

jobs:
  deploy:
    name: Build and deploy Laravel + Astro to CloudPanel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: Build Astro frontend
        working-directory: apps/frontend
        env:
          PUBLIC_SITE_URL: ${{ env.PUBLIC_SITE_URL }}
          PUBLIC_BACKEND_URL: ${{ env.PUBLIC_BACKEND_URL }}
          PUBLIC_API_BASE_URL: ${{ env.PUBLIC_API_BASE_URL }}
        run: pnpm build

      - name: Package Laravel and Astro
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy-package deploy.zip
          mkdir -p deploy-package/apps/frontend deploy-package/apps/backend

          cp -R apps/backend/. deploy-package/apps/backend/
          rm -rf deploy-package/apps/backend/vendor deploy-package/apps/backend/node_modules
          rm -rf deploy-package/apps/backend/storage/logs

          cp -R apps/frontend/dist deploy-package/apps/frontend/dist
          cp restart.sh deploy-package/restart.sh
          chmod +x deploy-package/restart.sh

          cd deploy-package
          zip -qr ../deploy.zip . \
            -x "*/.env" "*/.env.*" "*/node_modules/*" "*/vendor/*" \
            -x "*/storage/logs/*" "*.map" "*/.git/*" "*/.github/*"

      - name: Install SSH tooling
        run: sudo apt-get update && sudo apt-get install -y sshpass unzip

      - name: Upload package
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          sshpass -p "$SSH_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            -P "$SSH_PORT" \
            deploy.zip \
            "$SSH_USER@$SSH_HOST:deploy-lanyarddepok.zip"

      - name: Install Laravel dependencies and restart applications
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "APP_NAME='$APP_NAME' APP_PORT='$APP_PORT' REMOTE_PATH='$REMOTE_PATH' DEPLOY_ID='$GITHUB_SHA' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          if [ -d "$HOME/$REMOTE_PATH" ]; then
            APP_DIR="$HOME/$REMOTE_PATH"
          else
            APP_DIR="$REMOTE_PATH"
          fi

          STAGING_DIR="$HOME/.deploy-lanyarddepok-$DEPLOY_ID"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR" "$APP_DIR"
          unzip -q "$HOME/deploy-lanyarddepok.zip" -d "$STAGING_DIR"
          rm -f "$HOME/deploy-lanyarddepok.zip"

          ensure_backend_storage() {
            STORAGE_DIR="$APP_DIR/apps/backend/storage"
            STORAGE_BACKUP=""

            if [ -e "$STORAGE_DIR" ] && [ ! -d "$STORAGE_DIR" ]; then
              STORAGE_BACKUP="$APP_DIR/apps/backend/storage.unwritable.$(date +%Y%m%d%H%M%S)"
              echo "Existing storage path is not a directory. Moving it to $STORAGE_BACKUP."
              mv "$STORAGE_DIR" "$STORAGE_BACKUP"
            fi

            if [ -d "$STORAGE_DIR" ] && [ ! -w "$STORAGE_DIR" ]; then
              STORAGE_BACKUP="$APP_DIR/apps/backend/storage.unwritable.$(date +%Y%m%d%H%M%S)"
              echo "Existing storage directory is not writable. Moving it to $STORAGE_BACKUP."
              if ! mv "$STORAGE_DIR" "$STORAGE_BACKUP"; then
                echo "Cannot move unwritable storage directory. Please fix ownership for $STORAGE_DIR in CloudPanel, then rerun deploy."
                exit 1
              fi
            fi

            mkdir -p "$STORAGE_DIR"

            if [ -n "$STORAGE_BACKUP" ] && [ -d "$STORAGE_BACKUP/app/public" ]; then
              mkdir -p "$STORAGE_DIR/app/public"
              if command -v rsync >/dev/null 2>&1; then
                rsync -r --inplace \
                  --no-times --no-perms --no-owner --no-group --omit-dir-times \
                  "$STORAGE_BACKUP/app/public/" "$STORAGE_DIR/app/public/" || true
              else
                cp -R "$STORAGE_BACKUP/app/public/." "$STORAGE_DIR/app/public/" 2>/dev/null || true
              fi
            fi
          }

          if [ -d "$APP_DIR/shared/storage" ] && [ ! -f "$APP_DIR/.direct-deploy-migrated" ]; then
            mkdir -p "$APP_DIR/apps/backend/storage"
            if command -v rsync >/dev/null 2>&1; then
              rsync -r --inplace \
                --no-times --no-perms --no-owner --no-group --omit-dir-times \
                "$APP_DIR/shared/storage/" "$APP_DIR/apps/backend/storage/"
            else
              cp -R "$APP_DIR/shared/storage/." "$APP_DIR/apps/backend/storage/"
            fi
            touch "$APP_DIR/.direct-deploy-migrated"
          fi

          chmod -R u+rwX "$APP_DIR/apps" 2>/dev/null || true

          ensure_frontend_dist() {
            FRONTEND_DIST="$APP_DIR/apps/frontend/dist"
            FRONTEND_SERVER="$FRONTEND_DIST/server"

            if [ -d "$FRONTEND_SERVER" ] && [ ! -w "$FRONTEND_SERVER" ]; then
              FRONTEND_BACKUP="$APP_DIR/apps/frontend/dist.unwritable.$(date +%Y%m%d%H%M%S)"
              echo "Existing Astro dist server directory is not writable. Moving dist to $FRONTEND_BACKUP."
              if ! mv "$FRONTEND_DIST" "$FRONTEND_BACKUP"; then
                echo "Cannot move unwritable Astro dist directory. Rename or delete $FRONTEND_DIST in CloudPanel, then rerun deploy."
                exit 1
              fi
            fi
          }

          ensure_frontend_dist

          if command -v rsync >/dev/null 2>&1; then
            rsync -r --checksum \
              --no-times --no-perms --no-owner --no-group --omit-dir-times \
              --exclude 'apps/backend/.env' \
              --exclude 'apps/backend/storage/' \
              "$STAGING_DIR/" "$APP_DIR/"
          else
            cp -R "$STAGING_DIR/." "$APP_DIR/"
          fi

          rm -rf "$STAGING_DIR"

          if [ ! -f "$APP_DIR/apps/backend/.env" ] && [ -f "$APP_DIR/shared/backend.env" ]; then
            mkdir -p "$APP_DIR/apps/backend"
            cp "$APP_DIR/shared/backend.env" "$APP_DIR/apps/backend/.env"
          fi

          if [ ! -f "$APP_DIR/apps/backend/.env" ]; then
            echo "Laravel environment file not found. Create $APP_DIR/apps/backend/.env and rerun deploy."
            exit 1
          fi

          ensure_backend_storage
          mkdir -p \
            "$APP_DIR/apps/backend/storage/app/public" \
            "$APP_DIR/apps/backend/storage/framework/cache/data" \
            "$APP_DIR/apps/backend/storage/framework/sessions" \
            "$APP_DIR/apps/backend/storage/framework/views" \
            "$APP_DIR/apps/backend/storage/logs"

          cd "$APP_DIR/apps/backend"
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
          php artisan migrate --force
          php artisan storage:link || true
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          cd "$APP_DIR"
          chmod +x restart.sh
          APP_NAME="$APP_NAME" APP_PORT="$APP_PORT" REMOTE_PATH="$REMOTE_PATH" ./restart.sh

          sleep 3
          curl -fsS "http://127.0.0.1:$APP_PORT/" >/dev/null
          echo "Astro health check passed on port $APP_PORT."
          REMOTE_SCRIPT
