name: Build and Deploy Standalone Next.js to CloudPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js Site
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SKIP_DB_DURING_BUILD: "true"
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Zip Standalone Assets
        run: |
          cp restart.sh .next/standalone/restart.sh
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          cd .next/standalone
          zip -r ../../deploy.zip . \
            -x ".env" "*.map" "scratch/*" "scratch/**" ".git/*" ".github/*"
          cd ../..

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Trust SSH Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH Streaming
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd htdocs/jakartalanyard.com && cat > deploy.zip" < deploy.zip

          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            set -euo pipefail
            APP_NAME="jakartalanyard"

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            for f in "$HOME/.bash_profile" "$HOME/.bashrc" "$HOME/.profile"; do [ -f "$f" ] && . "$f"; done

            NVM_NODE_VER=$(ls "$HOME/.nvm/versions/node" 2>/dev/null | sort -V | tail -n1)
            if [ -n "$NVM_NODE_VER" ]; then
              export PATH="$HOME/.nvm/versions/node/$NVM_NODE_VER/bin:$PATH"
            fi
            export PATH="/usr/local/bin:/usr/bin:$PATH"

            cd "$HOME/htdocs/jakartalanyard.com"
            unzip -oq deploy.zip
            rm -f deploy.zip

            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi
            export PORT="${PORT:-3005}"
            export NODE_ENV=production

            if command -v pm2 >/dev/null 2>&1; then
              echo "Restarting $APP_NAME on port $PORT"
              fuser -k "$PORT/tcp" 2>/dev/null || true
              sleep 2
              pm2 restart "$APP_NAME" --update-env 2>&1 || pm2 start server.js --name "$APP_NAME"
              pm2 save 2>/dev/null || true
              sleep 5
              pm2 list 2>/dev/null || true
              pm2 logs "$APP_NAME" --lines 40 --nostream 2>&1 || true
            else
              echo "PM2 not found, starting with nohup"
              pkill -f "node server.js" 2>/dev/null || true
              pkill -f "next-server" 2>/dev/null || true
              sleep 2
              nohup node server.js > node.log 2>&1 &
              sleep 5
            fi

            curl -fsS "http://127.0.0.1:$PORT/" >/dev/null
            curl -fsS "http://127.0.0.1:$PORT/api/health" >/dev/null
            echo "Deploy health checks passed."
          ENDSSH
