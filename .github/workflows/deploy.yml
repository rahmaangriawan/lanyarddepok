name: Build and Deploy Standalone Next.js to CloudPanel

on:
  push:
    branches:
      - main # Ganti dengan branch utama Anda jika berbeda (misal: master)

jobs:
  build-and-deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js Site
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Tambahkan environment variables lain di sini jika dibutuhkan saat build

      - name: Zip Standalone Assets
        run: |
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          cd .next/standalone
          zip -r ../../deploy.zip .
          cd ../..

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy via SCP & SSH (Unzip on Server)
        run: |
          sshpass -p "${{ secrets.FTP_PASSWORD }}" scp -P 22 -o StrictHostKeyChecking=no deploy.zip ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:/home/mantap-jakarta/htdocs/jakartalanyard.com/
          sshpass -p "${{ secrets.FTP_PASSWORD }}" ssh -p 22 -o StrictHostKeyChecking=no ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} "cd /home/mantap-jakarta/htdocs/jakartalanyard.com && unzip -o deploy.zip && rm deploy.zip"
